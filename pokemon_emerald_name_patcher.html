<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pokémon GBA Name Patcher</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin-top: 10px; }
  </style>
</head>
<body>

<h2>Patch ROM Pokémon GBA</h2>

<input type="file" id="romInput"><br>
<button onclick="processRom()">Convertir</button>
<br><br>
<a id="downloadLink" download="patched.gba">Télécharger la ROM modifiée</a>
<div id="conversion_state" style="max-width: 100vw; word-break: break-all; overflow-wrap: break-word; hyphens: none; line-height: 0.7em; letter-spacing: 2px; font-family: monospace;"></div>

<script src="./data.js"></script>
<script>

// ===== Simplified Charset (A-Z + space)
const charMap = {};
const reverseMap = {};

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
for (let i = 0; i < letters.length; i++) {
  charMap[letters[i]] = 0xBB + i;
  reverseMap[0xBB + i] = letters[i];
}
charMap["é"] = 0x1B;
reverseMap[0x1B] = "é";
charMap[" "] = 0x00;
reverseMap[0x00] = " "
charMap["-"] = 0xAE;
reverseMap[0xAE] = "-";
charMap["’"] = 0xB4;
charMap["'"] = 0xB4;
reverseMap[0xB4] = "’";
charMap["."] = 0xAD;
reverseMap[0xAD] = ".";
charMap["♂"] = 0xB5;
reverseMap[0xB5] = "♂";
charMap["♀"] = 0xB6;
reverseMap[0xB6] = "♀";

// ===== Utils
function normalize(str) {
  return str
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Z \-\'\’\.\♂\♀]/g, "");
}

function encodeName(name) {
  const length = name.length
  const bytes = new Uint8Array(length+1).fill(0xFF);
  name = normalize(name);

  for (let i = 0; i < length; i++) {
    bytes[i] = charMap[name[i]] || 0x00;
  }

  return bytes;
}

function detectSlotSize(rom, foundAt) {
  let slotStart = foundAt;
  // Find the 0xFF in the name
  let ffPos = foundAt;
  while (ffPos < rom.length && rom[ffPos] !== 0xFF) {
    ffPos++;
  }
  // From ffPos +1, scan until non-0x00
  let slotEnd = ffPos;
  while (slotEnd + 1 < rom.length && rom[slotEnd+1] === 0x00) {
    slotEnd++;
  }
  return {start: slotStart, size: slotEnd - slotStart};
}

function buildNameForSlot(name, slotSize) {
  let encoded = encodeName(name);

  // truncate if too long
  if (encoded.length > slotSize - 1) {
    encoded = encoded.slice(0, slotSize);
    encoded[slotSize-1] = 0xFF; // end of string
  }
  
  const result = new Uint8Array(slotSize).fill(0x00);
  
  result.set(encoded, 0);
  
  return result;
}

function findSequenceFuzzy(rom, sequence, startOffset = 0, tolerance = 1) {
  for (let i = startOffset; i < rom.length - sequence.length; i++) {
    let errors = 0;

    for (let j = 0; j < sequence.length; j++) {
      if (rom[i + j] !== sequence[j]) {
        errors++;
        if (errors > tolerance) break;
      }
    }

    if ((rom[i-1] === 0x00 || rom[i-1] === 0XFF)
    && errors <= tolerance) {
      return i;
    }
  }

  if(startOffset > 0) {
    // console.warn(`Séquence ${Array.from(sequence).map(b => b.toString(16).padStart(2, '0')).join(' ')} non trouvée à partir de l'offset ${startOffset.toString(16)}, réessayage depuis le début`);
    return findSequenceFuzzy(rom, sequence, 0, tolerance);
  }
  
  return -1;
}

function replaceAt(rom, offset, newData) {
  for (let i = 0; i < newData.length; i++) {
    rom[offset + i] = newData[i];
  }
}

function patchTable(rom, offset, dict) {
  return new Promise(async (resolve) => {
    let changes = 0;
    let endOfPreviousSlot = offset;

    for (let [english, translated] of Object.entries(dict)) {
      const search = encodeName(english);
      const foundAt = findSequenceFuzzy(rom, search, endOfPreviousSlot, 1);

      if(foundAt === -1) {
        document.getElementById('conversion_state').innerText += "-";
        console.warn(`Pas de correspondance pour: ${english} (${Array.from(search).map(b => b.toString(16).padStart(2, '0')).join(' ')})`);
        continue;
      }
      
      const slotInfo = detectSlotSize(rom, foundAt);
      const slotSize = slotInfo.size;
      const slotStart = slotInfo.start;
      
      const replacement = buildNameForSlot(translated, slotSize);
      replaceAt(rom, foundAt, replacement);

      document.getElementById('conversion_state').innerText += "■";
      console.log(`✔ ${english} -> ${translated} (${foundAt.toString(16)})`);

      endOfPreviousSlot = foundAt + slotSize;
      changes++;

      // Yield to allow UI updates
      await new Promise(resolve => setTimeout(resolve, 0));
    }

    resolve({changes, endOfPreviousSlot});
  });
}

async function processRom() {
  const file = document.getElementById('romInput').files[0];
  if (!file) return alert("Charge une ROM");

  document.getElementById('conversion_state').innerText = "";

  const buffer = await file.arrayBuffer();
  const rom = new Uint8Array(buffer);

  const pokemonDict = dict.pokemon || {};
  const moveDict = dict.moves || {};

  const { changes: pkmChanges, endOfPreviousSlot: endOfPokemonTable } = await patchTable(
    rom,
    0,
    pokemonDict
  );

  const { changes: moveChanges, endOfPreviousSlot: endOfMoveTable } = await patchTable(
    rom,
    endOfPokemonTable,
    moveDict
  );

  const blob = new Blob([rom], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);

  const link = document.getElementById('downloadLink');
  link.href = url;

  alert(`Finished !\nPokémon updated: ${pkmChanges}\nMoves updated: ${moveChanges}`);
}

</script>

</body>
</html>
